        const categories = [...new Set(catalog.map(item => item.cat))];
        let currentTab = categories[0];
        let searchText = "";

        const tabsContainer = document.getElementById('tabsContainer');
        const cardGrid = document.getElementById('cardGrid');
        const searchInput = document.getElementById('searchInput');

        function renderTabs() {
            tabsContainer.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-button ${currentTab === cat && !searchText ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentTab = cat;
                    searchText = "";
                    searchInput.value = "";
                    renderCards();
                    renderTabs();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderCards() {
            cardGrid.innerHTML = '';
            const filtered = catalog.filter(item => {
                const searchLower = searchText.toLowerCase();
                return item.name.toLowerCase().includes(searchLower) || 
                       item.features.toLowerCase().includes(searchLower) ||
                       item.field.toLowerCase().includes(searchLower) ||
                       item.provider.toLowerCase().includes(searchLower);
            });

            const toDisplay = searchText ? filtered : filtered.filter(item => item.cat === currentTab);

            toDisplay.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.name}</a></h3>
                        <span class="provider">${item.provider}</span>
                        <div><span class="field-badge">${item.field}</span></div>
                    </div>
                    <h4>📌 主な特徴（詳細）</h4>
                    <div class="features">${item.features}</div>
                    <h4>💡 具体的活用例</h4>
                    <div class="usecase">${item.use}</div>
                `;
                cardGrid.appendChild(card);
            });

            if (toDisplay.length === 0) {
                cardGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px;">該当するツールが見つかりませんでした。</p>';
            }
        }

        searchInput.oninput = (e) => {
            searchText = e.target.value;
            renderCards();
            renderTabs();
        };

        renderTabs();
        renderCards();
    </script>
