        const categories = [...new Set(catalog.map(item => item.cat))];
        let currentTab = categories[0];
        let searchText = "";      
        let expandedQuery = "";   

        // Fuse.jsの設定（ヒット精度を少し緩めて広範囲に引っかかるように）
        const fuseOptions = {
            includeScore: true,
            threshold: 0.35,  // 0.3から0.35へ変更：少しのタイポや揺れでもヒットしやすく
            ignoreLocation: true,
            useExtendedSearch: true, 
            keys: [
                { name: 'name', weight: 3 },
                { name: 'keywords', weight: 2.5 }, // キーワードの重要度をアップ
                { name: 'features', weight: 1 },
                { name: 'use', weight: 1 },
                { name: 'provider', weight: 1.5 },
                { name: 'field', weight: 1 }
            ]
        };
        const fuse = new Fuse(catalog, fuseOptions);

        const tabsContainer = document.getElementById('tabsContainer');
        const cardGrid = document.getElementById('cardGrid');
        const searchInput = document.getElementById('searchInput');

        function renderTabs() {
            tabsContainer.innerHTML = '';
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-button ${currentTab === cat && !searchText ? 'active' : ''}`;
                btn.textContent = cat;
                btn.onclick = () => {
                    currentTab = cat;
                    searchText = "";
                    searchInput.value = "";
                    renderCards();
                    renderTabs();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function renderCards() {
            cardGrid.innerHTML = '';
            let toDisplay = [];

            if (searchText.trim() === "") {
                toDisplay = catalog.filter(item => item.cat === currentTab);
            } else {
                const results = fuse.search(expandedQuery);
                toDisplay = results.map(result => result.item);
            }

            toDisplay.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <h3><a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.name}</a></h3>
                        <span class="provider">${item.provider}</span>
                        <div><span class="field-badge">${item.field}</span></div>
                    </div>
                    <h4>📌 主な特徴（詳細）</h4>
                    <div class="features">${item.features}</div>
                    <h4>💡 具体的活用例</h4>
                    <div class="usecase">${item.use}</div>
                `;
                cardGrid.appendChild(card);
            });

            if (toDisplay.length === 0) {
                cardGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--muted); padding: 40px;">該当するツールが見つかりませんでした。別のキーワードをお試しください。</p>';
            }
        }

        searchInput.oninput = (e) => {
            searchText = e.target.value;
            let query = searchText.toLowerCase();
            let searchKeywords = [query];

            // ★ クエリ拡張（シノニム展開） ★
            if (query.includes("アメリカ") || query.includes("米国") || query.includes("usa")) {
                searchKeywords.push("google", "openai", "anthropic", "meta", "microsoft", "perplexity", "midjourney", "runway", "luma", "adobe", "github", "cognition", "vercel", "elevenlabs", "civitai", "mintplex");
            } 
            if (query.includes("中国")) {
                searchKeywords.push("alibaba", "bytedance", "deepseek");
            }

            expandedQuery = searchKeywords.join(" | ");
            renderCards();
            renderTabs();
        };

        renderTabs();
        renderCards();
    </script>
